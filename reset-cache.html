<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Osvezavanje FGR aplikacije</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #141009;
        color: #f4ead7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(440px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid rgba(225, 178, 75, 0.35);
        border-radius: 10px;
        background: #21190f;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; color: #c8b99d; line-height: 1.5; }
      a { color: #e1b24b; }
    </style>
  </head>
  <body>
    <main>
      <h1>Osvezavam FGR...</h1>
      <p>Brisem stari PWA cache i otvaram najnoviju verziju aplikacije.</p>
    </main>
    <script>
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {
          console.warn("Cache reset nije kompletno uspeo", error);
        }

        location.replace("./?v=96&cache-reset=" + Date.now());
      })();
    </script>
  </body>
</html>
