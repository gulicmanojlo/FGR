name: Process AI Stems

on:
  push:
    branches:
      - main
    paths:
      - 'playlists/*.json'

jobs:
  process-stems:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp demucs pydub

      - name: Run Stem Processor
        run: |
          python process_stems.py

      - name: Commit and Push Stems
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/ playlists/
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Process AI stems for new repertoire songs [skip ci]"
            git push origin main
          fi
